<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Quotation - Akshar Elec</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        :root {
            --navy: #001F3F;
        }
    </style>
</head>

<body class="bg-gray-100 font-sans">

<!-- NAVBAR (Same Style) -->
<nav class="bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

        <!-- Logo -->
        <div class="flex items-center gap-3">
            <img src="logo.png" class="h-12">
            <span class="text-2xl font-bold text-[#001F3F]">Akshar Electrotekniks</span>
        </div>

        <!-- Back Button -->
        <a href="index.html" class="text-[#001F3F] font-medium hover:underline">
            ← Back to Home
        </a>
    </div>
</nav>

<!-- HERO -->
<div class="bg-[#001F3F] text-white py-16 text-center">
    <h1 class="text-4xl font-bold mb-4">Get a Quotation</h1>
    <p class="text-gray-200 text-lg">
        Tell us your requirements and our experts will contact you shortly
    </p>
</div>

<!-- FORM SECTION -->
<div class="max-w-5xl mx-auto px-6 py-16">

    <div class="bg-white shadow-2xl rounded-3xl p-10">

        <form action="https://formsubmit.co/krinachauhan22@gmail.com"
      method="POST"
      class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_subject" value="New Quotation Request">
      <input type="hidden" name="_next" value="thankyou.html">

            <!-- Name -->
            <div>
                <label class="block mb-2 font-medium">
                   Full Name <span class="text-red-500">*</span>
               </label>
                <input type="text" name="name" required placeholder="Enter your name"
                      class="w-full border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#001F3F]">
            </div>

            <!-- Phone -->
            <div>
                  <label class="block mb-2 font-medium">
                        Phone Number <span class="text-red-500">*</span>
                  </label>
                 <input type="tel" name="phone" required placeholder="Enter your phone"
                       class="w-full border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#001F3F]">
            </div>

            <!-- Email -->
            <div>
                <label class="block mb-2 font-medium">
                      Email Address <span class="text-red-500">*</span>
                </label>
                <input type="email" name="email" required placeholder="Enter your email"
                       class="w-full border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#001F3F]">
            </div>

            <!-- Location -->
            <div>
                <label class="block mb-2 font-medium">Location</label>
                <input type="text" name="location" placeholder="City / Area"
                    class="w-full border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#001F3F]">
            </div>

            <!-- Services -->
            <div class="md:col-span-2">
                <label class="block mb-3 font-medium">Select Services</label>

                <div class="grid grid-cols-2 md:grid-cols-3 gap-4">

                    <label class="flex items-center gap-2">
                        <input type="checkbox" name="services[]" value="CCTV Surveillance"> CCTV Surveillance
                    </label>

                    <label class="flex items-center gap-2">
                        <input type="checkbox" name="services[]" value="Boom Barrier"> Boom Barrier
                    </label>

                    <label class="flex items-center gap-2">
                        <input type="checkbox" name="services[]" value="Gate Automation"> Gate Automation
                    </label>

                    <label class="flex items-center gap-2">
                        <input type="checkbox" name="services[]" value="Networking Solutions"> Networking Solutions
                    </label>

                    <label class="flex items-center gap-2">
                        <input type="checkbox" name="services[]" value="Digital Door Locks"> Digital Door Locks
                    </label>

                    <label class="flex items-center gap-2">
                        <input type="checkbox" name="services[]" value="Fire & Security Alarms"> Fire & Security Alarms
                    </label>

                </div>
            </div>

            <!-- Message -->
            <div class="md:col-span-2">
                <label class="block mb-2 font-medium">Project Details</label>
                <textarea rows="5" name="message" placeholder="Describe your requirement..."
                    class="w-full border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#001F3F]"></textarea>
            </div>

            <!-- Submit -->
            <div class="md:col-span-2 text-center mt-6">
                <button type="submit"
                    class="bg-[#001F3F] text-white px-12 py-4 rounded-2xl text-lg font-semibold hover:bg-[#002E5F] transition">
                    Submit Request
                    <i class="fa-solid fa-arrow-right ml-2"></i>
                </button>
            </div>

        </form>

    </div>
</div>

<!-- FOOTER -->
<footer class="bg-zinc-900 text-white py-10 text-center">
    <p class="text-gray-400">© 2026 Akshar Elec. All rights reserved.</p>
</footer>
<script>
document.querySelector("form").addEventListener("submit", function(e) {
    e.preventDefault();

    let formData = new FormData(this);

    fetch(this.action, {
        method: "POST",
        body: formData
    })
    .then(response => {
        alert("Form submitted successfully!");
    })
    .catch(error => {
        alert("Error submitting form");
    });
});
</script>

</body>
</html>
